<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Register</title>
</head>
<body style="background-image:url('https://img.magnific.com/free-photo/blur-hospital_1203-7972.jpg?semt=ais_hybrid&w=740&q=80'); background-size: cover ; background-repeat: no-repeat;" >
    <br><br><br><br><br>
    <fieldset style="border:  2px solid black;  ">

<center>
    <h1>Doctor Register</h1>
    <hr><br><br><br><br><br>


    <form>

        <label>Doctor Name : </label>
        <input type="text" placeholder="Enter Doctor Name">
        <br><br><br><br>

        <label>Email : </label>
        <input type="text" placeholder="Enter Email Address">
        <br><br><br><br>

        <label>Specialty : </label>
        <select>
            <option selected disabled>Select</option>
            <option>Cardiology</option>
            <option>Neurology</option>
            <option>Pediatrics</option>
            <option>Dermatology</option>
            <option>Orthopedics</option>
        </select>
        <br><br><br><br>

        <label>Phone : </label>
        <input type="tel" placeholder="Enter Phone Number">
        <br><br><br><br>

        <label>Password : </label>
        <input type="password" placeholder="Enter Password">
        <br><br><br><br>

        <button type="submit" class=" register-btn">Register</button>
        <br><br><br><br>


    </form>
</center>
</fieldset>
</body>
</html>
