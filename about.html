<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient</title>

<body>
    <body style="background-image: url('https://wallpaperaccess.com/full/1092711.jpg'); background-size: cover; background-repeat: no-repeat;">
 <center>  
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Online Hospital - Patient Portal</title>
</head>
<body>
  <header>
    <h1>Welcome to Online Hospital</h1>
    <p>Register or log in to access your patient portal.</p>
  </header>

  <main>
    <!-- Patient Registration Form -->
    <section>
      <h2>Patient Registration</h2>
      <form>
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" required><br><br>

        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" required><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label for="password">Create Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <button type="submit">Register</button>
        <button type="reset">Clear</button>
      </form>
    </section>

    <hr>

    <!-- Patient Login Form -->
    <section>
      <h2>Patient Login</h2>
      <form>
        <label for="patientID">Patient ID:</label><br>
        <input type="text" id="patientID" name="patientID" required><br><br>

        <label for="loginEmail">Email Address:</label><br>
        <input type="email" id="loginEmail" name="loginEmail" required><br><br>

        <label for="loginPassword">Password:</label><br>
        <input type="password" id="loginPassword" name="loginPassword" required><br><br>

        <button type="submit">Login</button>
        <button type="reset">Clear</button>
      </form>
    </section>
</center>

<br><br><br><br>
<br><br>
    <!-- Extra Links -->
    <section>
      <h2>Need Help?</h2>
      <ul>
        <li><a href="#ForgotPassword">Forgot Password</a></li>
        <li><a href="#ContactSupport">Contact Support</a></li>
      </ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Online Hospital | Contact: support@onlinehospital.com</p>
  </footer>
</body>
</html>


</body>
</html>
